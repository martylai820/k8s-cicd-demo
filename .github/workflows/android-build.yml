name: Build Android APK

on:
  push:
    branches: [ "main", "claude/**" ]
    paths:
      - 'android-ocr-translator/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    paths:
      - 'android-ocr-translator/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    name: Build debug & unsigned release APKs
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java / Gradle toolchain ────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Android SDK ────────────────────────────────────────────────────────
      # Step 1: android-actions/setup-android installs cmdline-tools and adds
      #         sdkmanager to PATH.  We do NOT rely on its 'packages' input
      #         because its reliability varies across versions.
      - name: Set up Android SDK (add sdkmanager to PATH)
        uses: android-actions/setup-android@v3

      # Step 2: Accept licences and install exactly what this project needs.
      #         sdkmanager is now in PATH thanks to the previous step.
      - name: Accept SDK licences and install platform 35
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      # Step 3: Write local.properties so Gradle can locate the SDK even if
      #         ANDROID_HOME is not propagated into the build environment.
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android-ocr-translator/local.properties

      # ── Gradle wrapper executable permission ───────────────────────────────
      - name: Grant gradlew execute permission
        run: chmod +x android-ocr-translator/gradlew

      # ── Gradle dependency cache ────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-ocr-translator/**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Build debug APK ────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android-ocr-translator
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Build unsigned release APK ─────────────────────────────────────────
      - name: Build unsigned release APK
        working-directory: android-ocr-translator
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Upload debug APK artifact ──────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OCRTranslator-debug
          path: android-ocr-translator/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      # ── Upload unsigned release APK artifact ───────────────────────────────
      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: OCRTranslator-release-unsigned
          path: android-ocr-translator/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: error
