name: Build Android APK

on:
  push:
    branches: [ "main", "claude/**" ]
    paths:
      - 'android-ocr-translator/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    paths:
      - 'android-ocr-translator/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    name: Build debug & unsigned release APKs
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java / Gradle toolchain ────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Android SDK ────────────────────────────────────────────────────────
      # android-actions/setup-android installs cmdline-tools and adds sdkmanager
      # to PATH. The packages input installs specific SDK components in the same
      # step, avoiding the "sdkmanager: command not found" error that occurs when
      # calling sdkmanager directly on ubuntu-latest before PATH is configured.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'
          accept-android-sdk-licenses: true

      # ── Gradle wrapper executable permission ───────────────────────────────
      - name: Grant gradlew execute permission
        run: chmod +x android-ocr-translator/gradlew

      # ── Gradle dependency cache ────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-ocr-translator/**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Build debug APK ────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: android-ocr-translator
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── Build unsigned release APK ─────────────────────────────────────────
      - name: Build unsigned release APK
        working-directory: android-ocr-translator
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── Upload debug APK artifact ──────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: OCRTranslator-debug
          path: android-ocr-translator/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error

      # ── Upload unsigned release APK artifact ───────────────────────────────
      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: OCRTranslator-release-unsigned
          path: android-ocr-translator/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: error
