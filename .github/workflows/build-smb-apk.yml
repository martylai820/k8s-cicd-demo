name: Build SMB Server APK

on:
  push:
    branches: [ "claude/smb-server-apk-CEl5k", "main" ]
    paths:
      - 'smb-server-app/**'
      - '.github/workflows/build-smb-apk.yml'
  pull_request:
    paths:
      - 'smb-server-app/**'
  workflow_dispatch:

env:
  GRADLE_VERSION: "8.6"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Download Gradle directly — no cache dependency, no wrapper jar needed
      - name: Install Gradle ${{ env.GRADLE_VERSION }}
        run: |
          wget -q \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH

      - name: Verify Gradle & Android SDK
        run: |
          gradle --version
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms" || echo "No platforms dir"

      # Accept Android SDK licenses (ubuntu-latest has SDK pre-installed)
      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null \
            || yes | "$ANDROID_HOME/tools/bin/sdkmanager" --licenses 2>/dev/null \
            || echo "sdkmanager not found, continuing..."

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        working-directory: smb-server-app

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smb-server-debug-${{ github.sha }}
          path: smb-server-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: gradle assembleRelease --no-daemon
        working-directory: smb-server-app

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: smb-server-release-unsigned-${{ github.sha }}
          path: smb-server-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
