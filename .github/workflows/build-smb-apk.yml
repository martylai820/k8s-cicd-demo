name: Build SMB Server APK

on:
  push:
    branches: [ "claude/smb-server-apk-CEl5k", "main" ]
    paths:
      - 'smb-server-app/**'
      - '.github/workflows/build-smb-apk.yml'
  pull_request:
    paths:
      - 'smb-server-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p smb-server-app/gradle/wrapper
          curl -sL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
            -o smb-server-app/gradle/wrapper/gradle-wrapper.jar || \
          # Fallback: use gradle to generate wrapper
          (cd smb-server-app && gradle wrapper --gradle-version=8.6 --distribution-type=bin 2>/dev/null || true)

      - name: Grant execute permission for gradlew
        run: chmod +x smb-server-app/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon
        working-directory: smb-server-app
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smb-server-debug-${{ github.sha }}
          path: smb-server-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon
        working-directory: smb-server-app

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: smb-server-release-unsigned-${{ github.sha }}
          path: smb-server-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
