name: Build SMB Server APK

on:
  push:
    branches: [ "claude/smb-server-apk-CEl5k", "main" ]
    paths:
      - 'smb-server-app/**'
      - '.github/workflows/build-smb-apk.yml'
  pull_request:
    paths:
      - 'smb-server-app/**'
  workflow_dispatch:

env:
  GRADLE_VERSION: "8.6"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Android SDK ────────────────────────────────────────────────────────
      # ubuntu-latest ships Android SDK at $ANDROID_HOME (/usr/local/lib/android/sdk).
      # We just need to install the exact platform + build-tools our project needs.
      - name: Install Android Platform 34 & Build Tools
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          # Add sdkmanager to PATH (location varies by runner image)
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_HOME/tools/bin/sdkmanager"
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── Gradle setup ──────────────────────────────────────────────────────
      - name: Install Gradle ${{ env.GRADLE_VERSION }}
        run: |
          wget -q \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH

      # ── sdk.dir for AGP ───────────────────────────────────────────────────
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
        working-directory: smb-server-app

      # ── Diagnostics ───────────────────────────────────────────────────────
      - name: Verify environment
        run: |
          echo "=== Java ===" && java -version 2>&1
          echo "=== Gradle ===" && /opt/gradle-${GRADLE_VERSION}/bin/gradle --version
          echo "=== ANDROID_HOME ===" && echo "$ANDROID_HOME"
          echo "=== Platforms ===" && ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "no platforms dir"
          echo "=== Build-Tools ===" && ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "no build-tools dir"
          echo "=== local.properties ===" && cat smb-server-app/local.properties

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        working-directory: smb-server-app

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smb-server-debug-${{ github.sha }}
          path: smb-server-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: gradle assembleRelease --no-daemon --stacktrace
        working-directory: smb-server-app

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: smb-server-release-unsigned-${{ github.sha }}
          path: smb-server-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
