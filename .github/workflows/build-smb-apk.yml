name: Build SMB Server APK

on:
  push:
    branches: [ "claude/smb-server-apk-CEl5k", "main" ]
    paths:
      - 'smb-server-app/**'
      - '.github/workflows/build-smb-apk.yml'
  pull_request:
    paths:
      - 'smb-server-app/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # needed to post error comments

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Android SDK ────────────────────────────────────────────────────────
      - name: Install Android SDK packages
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="$ANDROID_HOME/tools/bin/sdkmanager"
          fi
          echo "sdkmanager = $SDKMANAGER"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      # ── sdk.dir for AGP ───────────────────────────────────────────────────
      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties
        working-directory: smb-server-app

      # ── Diagnostics ───────────────────────────────────────────────────────
      - name: Verify environment
        run: |
          echo "=== Java ===" && java -version 2>&1
          echo "=== ANDROID_HOME ===" && echo "$ANDROID_HOME"
          echo "=== Platforms ===" && ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "no platforms"
          echo "=== Build-Tools ===" && ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "no build-tools"
          echo "=== local.properties ===" && cat smb-server-app/local.properties
          echo "=== gradlew ===" && ls -la smb-server-app/gradlew
          echo "=== wrapper jar ===" && ls -la smb-server-app/gradle/wrapper/gradle-wrapper.jar

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        id: build_debug
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build-debug.log
        working-directory: smb-server-app

      # ── Post error to PR on failure ────────────────────────────────────────
      - name: Report build error on PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = 'Could not read build log.';
            try {
              const full = fs.readFileSync('/tmp/build-debug.log', 'utf8');
              // Grab last 4000 chars which contain the failure
              log = full.length > 4000 ? full.slice(-4000) : full;
            } catch(e) { log = String(e); }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🔴 Build Debug APK — failure log\n\`\`\`\n${log}\n\`\`\``
            });

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smb-server-debug-${{ github.sha }}
          path: smb-server-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        working-directory: smb-server-app

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: smb-server-release-unsigned-${{ github.sha }}
          path: smb-server-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
