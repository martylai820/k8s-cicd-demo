name: Build SMB Server APK

on:
  push:
    branches: [ "claude/smb-server-apk-CEl5k", "main" ]
    paths:
      - 'smb-server-app/**'
      - '.github/workflows/build-smb-apk.yml'
  pull_request:
    paths:
      - 'smb-server-app/**'
  workflow_dispatch:

env:
  GRADLE_VERSION: "8.6"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Android SDK setup ─────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Platform 34 & Build Tools
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" \
            "platform-tools" --sdk_root="$ANDROID_HOME"

      # ── Gradle setup ──────────────────────────────────────────────────────
      - name: Install Gradle ${{ env.GRADLE_VERSION }}
        run: |
          wget -q \
            "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
            -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-${GRADLE_VERSION}/bin" >> $GITHUB_PATH

      # ── Diagnostics (shows what failed if build errors out) ───────────────
      - name: Verify environment
        run: |
          echo "=== Java ===" && java -version 2>&1
          echo "=== Gradle ===" && /opt/gradle-${GRADLE_VERSION}/bin/gradle --version
          echo "=== ANDROID_HOME ===" && echo "$ANDROID_HOME"
          echo "=== Platforms ===" && ls "$ANDROID_HOME/platforms/" 2>/dev/null || echo "no platforms"
          echo "=== Build-Tools ===" && ls "$ANDROID_HOME/build-tools/" 2>/dev/null || echo "no build-tools"

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        working-directory: smb-server-app

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smb-server-debug-${{ github.sha }}
          path: smb-server-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Build Release APK (unsigned)
        run: gradle assembleRelease --no-daemon --stacktrace
        working-directory: smb-server-app

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: smb-server-release-unsigned-${{ github.sha }}
          path: smb-server-app/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30
